<!DOCTYPE html>
<html>
<head>
    <title>Quiz Result</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
        }

        .success {
            color: green;
            font-size: 18px;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #007bff;
            text-decoration: none;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Quiz Result</h2>

    <div class="success">
        🎉 Submitted Successfully!
    </div>

    <p>Your result has been sent to your email.</p>

    <a href="/dashboard">Go to Dashboard</a>

</div>

</body>
</html>
