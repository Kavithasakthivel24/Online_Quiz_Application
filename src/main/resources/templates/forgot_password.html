<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #3b8eea;
        }

        .msg {
            margin-top: 10px;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Forgot Password 🔑</h2>

    <!-- FORM -->
    <form id="forgotForm">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit">Send OTP</button>
    </form>

    <!-- MESSAGE -->
    <div id="message" class="msg"></div>

    <!-- ✅ MVC ROUTE -->
    <a href="/login">Back to Login</a>
</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;

    fetch("/forgot-password_otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "email=" + encodeURIComponent(email)
    })
    .then(res => res.text())
    .then(data => {
        const msg = document.getElementById("message");

        if (data.includes("OTP sent")) {
            msg.innerHTML = data;
            msg.className = "msg success";

            // ✅ MVC redirect (IMPORTANT FIX)
            setTimeout(() => {
                window.location.href = "/reset-password-page?email=" + email;
            }, 2000);

        } else {
            msg.innerHTML = data;
            msg.className = "msg error";
        }
    })
    .catch(() => {
        const msg = document.getElementById("message");
        msg.innerHTML = "Something went wrong!";
        msg.className = "msg error";
    });
});
</script>

</body>
</html>
