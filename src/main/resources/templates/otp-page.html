<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Verify OTP</h2>

    <form action="/verify-otp" method="post">

        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify</button>

    </form>

</div>

</body>
</html>
